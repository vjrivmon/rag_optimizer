[pytest]
# Pytest configuration

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Python files/functions/classes patterns
python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_*

# Add current directory to Python path
pythonpath = .

# Command line options (always applied)
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail if unknown marker used)
    --strict-markers
    # Strict config (fail on config errors)
    --strict-config
    # Show warnings
    -W default
    # Fail on first error (comment out for CI)
    # -x
    # Stop after N failures
    --maxfail=10

# Markers for test categorization
markers =
    # Platform markers
    web: Tests specific to web version (v3.x)
    telegram: Tests specific to telegram version (v4.x)
    shared: Tests for shared code (RAG, evaluators)

    # Test type markers
    unit: Unit tests (isolated, fast)
    integration: Integration tests (multiple components)
    e2e: End-to-end tests (full system)

    # Feature markers
    database: Tests requiring database (PostgreSQL)
    rag: Tests for RAG engine
    context: Tests for context management
    service: Tests for service layer
    bot: Tests for Telegram bot

    # Performance markers
    slow: Tests that take >1s (skipped in quick runs)
    benchmark: Benchmark tests

    # Other markers
    skip_ci: Skip in CI environment
    requires_ollama: Tests requiring Ollama server

# Asyncio mode
asyncio_mode = auto

# Console output style
console_output_style = progress

# Log format
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (seconds)
timeout = 300

# Coverage options (when using pytest-cov)
# These can be overridden by command line
# --cov=src --cov-report=html

# Ignore paths
norecursedirs =
    .git
    .tox
    .env
    .venv
    venv
    env
    __pycache__
    build
    dist
    *.egg
    .eggs
    htmlcov
    .pytest_cache
    node_modules
    alembic/versions

# Filterwarnings
filterwarnings =
    # Ignore specific warnings
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Turn warnings into errors (uncomment for strict mode)
    # error
